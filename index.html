<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Inkdown — Markdown Studio</title><meta name="description" content="Inkdown — A beautiful GitHub-flavored markdown editor with live preview. Free, open source, no login required."><meta property="og:title" content="Inkdown — Markdown Studio"><meta property="og:description" content="Write, preview, and share markdown beautifully. GitHub-flavored. No login."><meta name="theme-color" content="#0d1117"><script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script><link rel="stylesheet" href="css/inkdown.css"><link rel="stylesheet" href="css/inkdown-responsive.css"></head><body><div id="app"><div id="brand-bar"><a id="logo-wrap" href="#" onclick="return false"><div id="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><div id="logo-text"><span id="logo-name">inkdown</span><span id="logo-tagline">markdown studio</span></div></a><div class="bar-sep"></div><div id="file-status"><span id="filename-chip">inkdown.md</span><span id="dot-unsaved" title="Unsaved changes"></span></div><div class="bar-sep"></div><div id="view-tabs"><button class="vtab on" data-m="split">Split</button><button class="vtab" data-m="editor">Editor</button><button class="vtab" data-m="preview">Preview</button></div><div class="flex1"></div><span id="word-stats">0 words · 0 lines</span><button class="tbtn" id="btn-open"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Open</button><button class="tbtn" id="btn-save"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save</button><button class="tbtn accent" id="btn-copy-html"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Export HTML</button></div><div id="toolbar"><span class="tool-label">Heading</span><button class="tbtn-tool h1" data-insert="h1" title="Heading 1"># H1</button><button class="tbtn-tool h2" data-insert="h2" title="Heading 2">## H2</button><button class="tbtn-tool h3" data-insert="h3" title="Heading 3">### H3</button><div class="tool-sep"></div><span class="tool-label">Format</span><button class="tbtn-tool bold" data-insert="bold" title="Bold"><b>B</b></button><button class="tbtn-tool italic" data-insert="italic" title="Italic"><i>I</i></button><button class="tbtn-tool" data-insert="strike" title="Strikethrough" style="text-decoration:line-through">S</button><button class="tbtn-tool code-inline" data-insert="code-inline" title="Inline code">`code`</button><div class="tool-sep"></div><span class="tool-label">Block</span><button class="tbtn-tool quote" data-insert="blockquote" title="Blockquote">❝ Quote</button><button class="tbtn-tool" data-insert="hr" title="Horizontal rule">― HR</button><button class="tbtn-tool" data-insert="code-block" title="Code block"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Code Block</button><div class="tool-sep"></div><span class="tool-label">Lists</span><button class="tbtn-tool" data-insert="ul" title="Bullet list">• List</button><button class="tbtn-tool" data-insert="ol" title="Numbered list">1. List</button><button class="tbtn-tool task" data-insert="tasklist" title="Task list">☑ Tasks</button><div class="tool-sep"></div><span class="tool-label">Insert</span><button class="tbtn-tool link" data-insert="link" title="Link"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Link</button><button class="tbtn-tool" data-insert="image" title="Image"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Image</button><button class="tbtn-tool table-btn" data-insert="table" title="Table"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>Table</button><button class="tbtn-tool" data-insert="details" title="Collapsible section">▾ Details</button><button class="tbtn-tool" data-insert="badge" title="Badge (img.shields.io)" style="color:var(--purple)">🏷 Badge</button></div><div id="panes"><div id="editor-pane"><div class="pane-hdr"><div class="pane-dot" style="background:var(--orange)"></div>Source<div class="flex1"></div><span class="kbd">Ctrl+S</span>&nbsp;save &nbsp;<span class="kbd">Tab</span>&nbsp;indent</div><div id="line-nums"></div><textarea id="editor" spellcheck="false"></textarea></div><div id="divider"></div><div id="preview-pane"><div class="pane-hdr"><div class="pane-dot" style="background:var(--green)"></div>Preview<span style="font-size:9px;margin-left:5px;color:var(--border2)">GFM</span><div class="flex1"></div><span style="font-size:9px;color:var(--border2)">Live ●</span></div><div id="preview"><div id="md-out"></div><div id="empty"><div class="glow-ring"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><p>Start writing in the editor<br>or open a <code style="font-size:11px">.md</code> file.</p></div></div></div></div></div><div id="modal-bg"><div id="modal"><h3>Insert Table</h3><div class="field-row"><label>Columns</label><input type="number" id="tbl-cols" value="3" min="1" max="10"></div><div class="field-row"><label>Rows (data rows)</label><input type="number" id="tbl-rows" value="2" min="1" max="20"></div><div class="field-row"><label>Column alignment</label><select id="tbl-align"><option value="left">Left (default)</option><option value="center">Center</option><option value="right">Right</option></select></div><div class="modal-actions"><button class="modal-btn cancel" id="modal-cancel">Cancel</button><button class="modal-btn insert" id="modal-insert">Insert Table</button></div></div></div><div id="link-modal-bg" class="hide" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;"><div id="link-modal" style="background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:24px;width:400px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.5);"><h3 style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:16px;">Insert Link</h3><div class="field-row"><label>Display text</label><input type="text" id="lnk-text" placeholder="Link text"></div><div class="field-row"><label>URL</label><input type="url" id="lnk-url" placeholder="https://"></div><div class="modal-actions"><button class="modal-btn cancel" id="lnk-cancel">Cancel</button><button class="modal-btn insert" id="lnk-insert">Insert</button></div></div></div><div id="img-modal-bg" class="hide" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;"><div style="background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:24px;width:400px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.5);"><h3 style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:16px;">Insert Image</h3><div class="field-row"><label>Alt text</label><input type="text" id="img-alt" placeholder="Image description"></div><div class="field-row"><label>Image URL</label><input type="url" id="img-url" placeholder="https://"></div><div class="modal-actions"><button class="modal-btn cancel" id="img-cancel">Cancel</button><button class="modal-btn insert" id="img-insert">Insert</button></div></div></div><div id="badge-modal-bg" class="hide" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;"><div style="background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:24px;width:420px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.5);"><h3 style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:16px;">Insert Shield Badge</h3><div class="field-row"><label>Label (left)</label><input type="text" id="bdg-label" placeholder="build"></div><div class="field-row"><label>Message (right)</label><input type="text" id="bdg-msg" placeholder="passing"></div><div class="field-row"><label>Color</label><select id="bdg-color"><option>brightgreen</option><option>green</option><option>blue</option><option>orange</option><option>red</option><option>lightgrey</option><option>blueviolet</option></select></div><div class="field-row"><label>Link URL (optional)</label><input type="url" id="bdg-link" placeholder="https://"></div><div class="modal-actions"><button class="modal-btn cancel" id="bdg-cancel">Cancel</button><button class="modal-btn insert" id="bdg-insert">Insert Badge</button></div></div></div><input type="file" id="file-in" accept=".md,.markdown,.txt" style="display:none"><a id="dl-link" style="display:none"></a><div id="toast"><span id="toast-dot"></span><span id="toast-msg"></span></div><script src="js/inkdown.js"></script><script src="js/inkdown-responsive.js"></script></body></html>
